<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>توصيل الطلب | Dr. Wells</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass-card w-full max-w-sm rounded-[2rem] shadow-2xl overflow-hidden border border-gray-100 relative">
        
        <div class="bg-gradient-to-br from-blue-600 to-indigo-800 p-8 text-center text-white relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl"></div>
            <i class="fa-solid fa-motorcycle text-5xl mb-3 drop-shadow-md"></i>
            <h1 class="text-2xl font-black tracking-wide">بيانات التوصيل</h1>
            <p class="text-blue-100 text-sm mt-1 font-semibold">صيدليات Dr. Wells</p>
        </div>

        <div class="p-6 space-y-6 -mt-4 bg-white rounded-t-[2rem] relative z-10">
            
            <div class="text-center mb-2">
                <h2 id="client-name" class="text-xl font-bold text-gray-800">جاري تحميل البيانات...</h2>
                <p id="invoice-no" class="text-sm text-gray-500 font-semibold mt-1"></p>
            </div>

            <a id="btn-call" href="#" class="flex items-center p-4 bg-green-50 border border-green-200 rounded-2xl hover:bg-green-100 active:scale-95 transition-all shadow-sm">
                <div class="w-12 h-12 bg-green-500 text-white rounded-full flex items-center justify-center text-xl shadow-md shrink-0">
                    <i class="fa-solid fa-phone-volume"></i>
                </div>
                <div class="mr-4">
                    <p class="text-xs text-green-700 font-bold mb-0.5">اتصال بالعميل</p>
                    <p id="client-phone" class="text-lg font-black text-gray-800" dir="ltr">---</p>
                </div>
            </a>

            <div class="flex items-start p-4 bg-gray-50 border border-gray-200 rounded-2xl shadow-sm">
                <div class="w-10 h-10 bg-gray-200 text-gray-600 rounded-full flex items-center justify-center text-lg shrink-0 mt-1">
                    <i class="fa-solid fa-house-chimney"></i>
                </div>
                <div class="mr-4">
                    <p class="text-xs text-gray-500 font-bold mb-0.5">عنوان التوصيل (نصي)</p>
                    <p id="client-address" class="text-sm font-bold text-gray-800 leading-relaxed">---</p>
                </div>
            </div>

            <a id="btn-map" href="#" target="_blank" class="flex items-center p-4 bg-blue-50 border border-blue-200 rounded-2xl hover:bg-blue-100 active:scale-95 transition-all shadow-sm">
                <div class="w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center text-xl shadow-md shrink-0">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <div class="mr-4">
                    <p class="text-xs text-blue-700 font-bold mb-0.5">الموقع على الخريطة</p>
                    <p class="text-sm font-black text-gray-800">فتح Google Maps</p>
                </div>
            </a>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            
            const name = urlParams.get('name') || 'عميل بدون اسم';
            const phone = urlParams.get('phone') || '';
            const address = urlParams.get('address') || 'لم يتم تسجيل عنوان نصي.';
            const loc = urlParams.get('loc') || '';
            const invNo = urlParams.get('inv') || '';

            document.getElementById('client-name').innerText = name;
            if(invNo) document.getElementById('invoice-no').innerText = `طلب رقم: ${invNo}`;
            document.getElementById('client-phone').innerText = phone || 'لا يوجد رقم';
            document.getElementById('client-address').innerText = address;

            const btnCall = document.getElementById('btn-call');
            if (phone && phone !== '-') {
                btnCall.href = `tel:${phone}`;
            } else {
                btnCall.style.opacity = '0.5';
                btnCall.style.pointerEvents = 'none';
            }

            const btnMap = document.getElementById('btn-map');
            if (loc && loc.startsWith('http')) {
                btnMap.href = loc;
            } else {
                btnMap.style.opacity = '0.5';
                btnMap.style.pointerEvents = 'none';
                btnMap.querySelector('p:last-child').innerText = 'الرابط غير متوفر';
            }
        });
    </script>
</body>
</html>
