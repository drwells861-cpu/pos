<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معلومات الطلب | التوصيل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #f3f4f6;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(10px); 
        }
        /* حركة دخول ناعمة للبطاقة */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeInUp 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 sm:p-8">

    <div class="glass-card w-full max-w-2xl rounded-[2rem] shadow-2xl overflow-hidden border border-gray-100 relative animate-fade-in">
        
        <div class="bg-gradient-to-br from-blue-600 to-indigo-800 p-8 sm:p-10 text-center text-white relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-white opacity-10 rounded-full blur-2xl"></div>
            <div class="absolute bottom-0 left-0 w-32 h-32 bg-indigo-500 opacity-20 rounded-full blur-xl"></div>
            <i class="fa-solid fa-motorcycle text-5xl sm:text-6xl mb-4 drop-shadow-lg"></i>
            <h1 class="text-2xl sm:text-3xl font-black tracking-wide">بيانات التوصيل</h1>
            <p class="text-blue-100 text-sm sm:text-base mt-2 font-semibold tracking-widest">POS-PRO</p>
        </div>

        <div class="p-6 sm:p-8 space-y-6 -mt-6 bg-white rounded-t-[2rem] relative z-10">
            
            <div class="text-center mb-4">
                <h2 id="client-name" class="text-2xl font-bold text-gray-800">جاري تحميل البيانات...</h2>
                <div class="inline-block mt-2 px-4 py-1 bg-gray-100 rounded-full border border-gray-200">
                    <p id="invoice-no" class="text-sm text-gray-600 font-bold"><i class="fa-solid fa-receipt mr-1 ml-1 text-gray-400"></i> طلب رقم: ---</p>
                </div>
            </div>

            <div id="total-container" class="flex items-center justify-between p-4 sm:p-5 bg-yellow-50 border border-yellow-200 rounded-2xl shadow-sm transition-transform hover:scale-[1.01]">
                <div class="flex items-center">
                    <div class="w-12 h-12 bg-yellow-400 text-white rounded-full flex items-center justify-center text-xl shadow-md shrink-0">
                        <i class="fa-solid fa-money-bill-wave"></i>
                    </div>
                    <div class="mr-4">
                        <p class="text-xs sm:text-sm text-yellow-700 font-bold mb-0.5">إجمالي قيمة الطلب</p>
                        <p class="text-xl sm:text-2xl font-black text-gray-800"><span id="order-total">---</span> <span class="text-sm font-bold text-gray-500">ج.م</span></p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <a id="btn-call" href="#" class="flex items-center p-4 bg-green-50 border border-green-200 rounded-2xl hover:bg-green-100 active:scale-95 transition-all shadow-sm">
                    <div class="w-12 h-12 bg-green-500 text-white rounded-full flex items-center justify-center text-xl shadow-md shrink-0">
                        <i class="fa-solid fa-phone-volume"></i>
                    </div>
                    <div class="mr-4">
                        <p class="text-xs sm:text-sm text-green-700 font-bold mb-0.5">اتصال بالعميل</p>
                        <p id="client-phone" class="text-lg font-black text-gray-800 tracking-wider" dir="ltr">---</p>
                    </div>
                </a>

                <a id="btn-whatsapp" href="#" target="_blank" class="flex items-center p-4 bg-emerald-50 border border-emerald-200 rounded-2xl hover:bg-emerald-100 active:scale-95 transition-all shadow-sm">
                    <div class="w-12 h-12 bg-emerald-500 text-white rounded-full flex items-center justify-center text-xl shadow-md shrink-0">
                        <i class="fa-brands fa-whatsapp text-2xl"></i>
                    </div>
                    <div class="mr-4">
                        <p class="text-xs sm:text-sm text-emerald-700 font-bold mb-0.5">محادثة واتساب</p>
                        <p class="text-sm font-black text-gray-800">تواصل سريع</p>
                    </div>
                </a>
            </div>

            <div class="flex items-start p-4 sm:p-5 bg-gray-50 border border-gray-200 rounded-2xl shadow-sm">
                <div class="w-12 h-12 bg-gray-200 text-gray-600 rounded-full flex items-center justify-center text-lg shadow-inner shrink-0 mt-1">
                    <i class="fa-solid fa-house-chimney"></i>
                </div>
                <div class="mr-4 w-full">
                    <p class="text-xs sm:text-sm text-gray-500 font-bold mb-1">عنوان التوصيل (نصي)</p>
                    <p id="client-address" class="text-sm sm:text-base font-bold text-gray-800 leading-relaxed bg-white p-3 rounded-xl border border-gray-100 shadow-sm w-full break-words">---</p>
                </div>
            </div>

            <a id="btn-map" href="#" target="_blank" class="flex items-center p-4 sm:p-5 bg-blue-50 border border-blue-200 rounded-2xl hover:bg-blue-100 active:scale-95 transition-all shadow-sm">
                <div class="w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center text-xl shadow-md shrink-0">
                    <i class="fa-solid fa-map-location-dot"></i>
                </div>
                <div class="mr-4 flex-1">
                    <p class="text-xs sm:text-sm text-blue-700 font-bold mb-0.5">الموقع على الخريطة</p>
                    <p class="text-sm sm:text-base font-black text-gray-800">فتح عبر Google Maps</p>
                </div>
                <i class="fa-solid fa-chevron-left text-blue-400"></i>
            </a>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            
            // استقبال الاختصارات (بما في ذلك الإجمالي الجديد 't')
            const name = urlParams.get('n') || 'عميل';
            const phone = urlParams.get('p') || '';
            const address = urlParams.get('a') || 'لا يوجد عنوان مسجل';
            const loc = urlParams.get('l') || '';
            const invNo = urlParams.get('inv') || '';
            const total = urlParams.get('t') || ''; // اختصار إجمالي الطلب
            
            // تعبئة البيانات الأساسية
            document.getElementById('client-name').innerText = name;
            document.getElementById('invoice-no').innerHTML = `<i class="fa-solid fa-receipt mr-1 ml-1 text-gray-400"></i> طلب رقم: ${invNo || 'غير محدد'}`;
            document.getElementById('client-phone').innerText = phone || 'لا يوجد رقم';
            document.getElementById('client-address').innerText = address;

            // معالجة إجمالي الطلب
            const totalContainer = document.getElementById('total-container');
            const totalSpan = document.getElementById('order-total');
            if(total) {
                totalSpan.innerText = total;
            } else {
                totalContainer.style.display = 'none'; // إخفاء الحقل إذا لم يتم تمرير قيمة الإجمالي
            }

            // معالجة زر الاتصال
            const btnCall = document.getElementById('btn-call');
            const btnWa = document.getElementById('btn-whatsapp');
            
            if (phone && phone !== '-') {
                btnCall.href = `tel:${phone}`;
                
                // تنظيف رقم الهاتف لرابط الواتساب (إزالة المسافات أو أي رموز غير رقمية باستثناء علامة +)
                const cleanPhone = phone.replace(/[^0-9+]/g, '');
                btnWa.href = `https://wa.me/${cleanPhone}`;
            } else {
                // تعطيل الأزرار في حال عدم وجود رقم
                btnCall.style.opacity = '0.5';
                btnCall.style.pointerEvents = 'none';
                
                btnWa.style.opacity = '0.5';
                btnWa.style.pointerEvents = 'none';
            }

            // معالجة رابط الخريطة
            const btnMap = document.getElementById('btn-map');
            if (loc && (loc.startsWith('http') || loc.startsWith('geo:'))) {
                btnMap.href = loc;
            } else {
                btnMap.style.opacity = '0.5';
                btnMap.style.pointerEvents = 'none';
                btnMap.querySelector('p:last-child').innerText = 'رابط الموقع غير متوفر';
            }
        });
    </script>
</body>
</html>
